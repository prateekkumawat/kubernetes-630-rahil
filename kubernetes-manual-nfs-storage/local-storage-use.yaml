apiVersion: v1
kind: Pod
metadata:
  name: myapp1
  labels:
    app.kubernetes.io/name: myapp
spec:
  containers:
  - name: myapp
    image: ubuntu:latest
    resources:
      requests:
        memory: "100Mi"
        cpu: "200m"
      limits:
        memory: "128Mi"
        cpu: "500m"
    command:
      - sleep
      - "3600"    
    volumeMounts:
    - name: data-path
      mountPath: /mnt
  volumes:
  - name: data-path
    hostPath:
      path: /opt/container-data-path


# loghorn https://longhorn.io/docs/1.11.0/deploy/install/
# openEBS https://openebs.io/docs/introduction-to-openebs/usecases