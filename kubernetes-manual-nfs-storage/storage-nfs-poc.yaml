apiVersion: v1
kind: Namespace
metadata:
  name: external-nfs-data

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-data-vol1
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:
    path: /containerdata
    server: 172.31.8.218

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-data-vol-mount1
  namespace: external-nfs-data
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: storage-mount-pod
  namespace: external-nfs-data
  labels:
    app: nfsmount
spec:
  volumes:
  - name: share-data
    persistentVolumeClaim:
      claimName: nfs-data-vol-mount1
  containers:
  - name: storage-mount-pod
    image: ubuntu:latest
    resources:
      requests: 
        memory: "100Mi"
        cpu: "300m"
      limits:
        memory: "128Mi"
        cpu: "500m"
    command:
      - sleep
      - "3600"  
    volumeMounts:
    - name: share-data
      mountPath: /opt   

