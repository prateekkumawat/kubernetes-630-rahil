apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: role-developer1
  namespace: default
rules:
- apiGroups: ["", "extensions", "apps"]
  resources: ["pods", "deployments", "replicasets", "secrets", "pvc"]
  verbs: ["get", "watch", "list", "create", "delete" , "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: role-bind-developer1
  namespace: default
subjects:
- kind: User
  name: kube1user
  apiGroup: ""
roleRef:
  kind: Role 
  name: role-developer1 
  apiGroup: ""
