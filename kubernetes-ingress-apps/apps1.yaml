apiVersion: v1
kind: Pod
metadata:
  name: app1
  labels:
    app.kubernetes.io/name: app1
spec:
  containers:
  - name: app1
    image: prateekkumawat/ingress-example:app1
    resources:
      requests:
        memory: "100Mi"
        cpu: "300m" 
      limits:
        memory: "128Mi"     
        cpu: "500m"
    ports:
    - containerPort: 80
      name: http

---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector:
    app.kubernetes.io/name: app1
  ports:
  - port: 80
    targetPort: 80
